name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          AUTH_SECRET: ci-test-secret-do-not-use-in-production

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-build-placeholder
          DATABASE_PATH: /tmp/filebridge-build.db
          NEXT_PHASE: phase-production-build

  label:
    name: Label PR
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test, build]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Apply CI result label
        uses: actions/github-script@v7
        with:
          script: |
            const passed =
              '${{ needs.lint-typecheck.result }}' === 'success' &&
              '${{ needs.test.result }}'           === 'success' &&
              '${{ needs.build.result }}'          === 'success';

            const passLabel   = 'ci: passed';
            const failLabel   = 'ci: failed';
            const addLabel    = passed ? passLabel : failLabel;
            const removeLabel = passed ? failLabel : passLabel;

            // Ensure both labels exist on the repo (creates them if missing)
            for (const [name, color] of [
              [passLabel, '0e8a16'],
              [failLabel, 'd73a4a'],
            ]) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name,
                  color,
                });
              }
            }

            // Remove the stale opposite label (ignore 404 if it wasn't applied)
            try {
              await github.rest.issues.removeLabel({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                name:         removeLabel,
              });
            } catch (_) {}

            // Apply the current result label
            await github.rest.issues.addLabels({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              labels:       [addLabel],
            });
